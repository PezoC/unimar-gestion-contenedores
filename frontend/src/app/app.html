<div class="contenedor">

    <h1>Mantenimiento de Contenedores UNIMAR (Gustavo Pezo Castilla)</h1>

    <button class="btn-nuevo" (click)="nuevoContenedor()">

        + Nuevo Contenedor

    </button>

    <div class="modal-backdrop" *ngIf="mostrarModal">

        <div class="modal-container">

            <div class="modal-header">

                <h2>

                    {{ contenedorModal
                    ? 'Editar Contenedor'
                    : 'Nuevo Contenedor' }}

                </h2>

                <button class="btn-cerrar" (click)="cerrarModal()">

                    Cerrar

                </button>

            </div>

            <app-contenedor-formulario [contenedorModal]="contenedorModal">

            </app-contenedor-formulario>

        </div>

    </div>

    <div class="card">

        <app-contenedor-lista (editarContenedor)="seleccionarContenedor($event)">

        </app-contenedor-lista>

    </div>

</div>
